<div class="form-group">
    <label>Time Mode</label>
    <select class="form-control custom-select" id="time_mode_select">
        <option value="specific">Specific Time (HH:MM:SS)</option>
        <option value="range">Time Range</option>
    </select>
</div>

<div class="form-group" id="specific_time_container">
    <label>Target Time</label>
    <input type="text" class="form-control" id="target_time" placeholder="00:12:30" pattern="[0-9]{1,2}:[0-9]{2}:[0-9]{2}">
    <small class="text-muted">Format: Hours:Minutes:Seconds</small>
</div>

<div class="form-group d-none" id="range_time_container">
    <div class="row">
        <div class="col-md-6">
            <label>Start Time</label>
            <input type="text" class="form-control" id="start_time" placeholder="00:00:00">
        </div>
        <div class="col-md-6">
            <label>End Time</label>
            <input type="text" class="form-control" id="end_time" placeholder="00:59:59">
        </div>
    </div>
</div>

<input type="hidden" name="content" id="final_content">
<input type="hidden" name="data" id="data_field">
<input type="hidden" name="type" value="time">

<script>
(function(){
    // Use more specific selectors to avoid collisions with other flags
    const modal = document.querySelector('#content-modal');
    const modeSelect = modal.querySelector("#time_mode_select");
    const specificCont = modal.querySelector("#specific_time_container");
    const rangeCont = modal.querySelector("#range_time_container");
    
    const finalContent = modal.querySelector("#final_content");
    const dataField = modal.querySelector("#data_field");

    function sync() {
        const mode = modeSelect.value;
        let dataObj = { mode: mode };

        if (mode === "specific") {
            const val = modal.querySelector("#target_time").value;
            finalContent.value = val;
            dataObj.target = val;
        } else {
            const start = modal.querySelector("#start_time_input").value;
            const end = modal.querySelector("#end_time_input").value;
            // This 'content' is what shows up in the "Flag" column in your screenshot
            finalContent.value = start + "-" + end; 
            dataObj.start = start;
            dataObj.end = end;
        }
        dataField.value = JSON.stringify(dataObj);
    }

    // Attach listeners to everything
    modeSelect.addEventListener("change", function() {
        specificCont.classList.toggle("d-none", this.value === "range");
        rangeCont.classList.toggle("d-none", this.value === "specific");
        sync();
    });

    // Sync on every keystroke so the hidden inputs are always ready
    modal.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', sync);
    });
})();
</script>
