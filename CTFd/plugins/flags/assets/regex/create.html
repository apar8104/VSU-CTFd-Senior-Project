

<div class="form-group">
    <label>Regex Mode</label>
    <select class="form-control custom-select col-md-6" name="regex_mode" id="regex_mode">
        <option value="unranged">Standard Regex</option>
        <option value="range">Numeric Range</option>
    </select>
</div>
<label>
    Regex Flag<br>
    <small>Enter regex flag data</small>
</label>
<!-- This below div is where the flag is recieved from -->
<div class="form-group" id="regex_input">
    <input type="text" class="form-control" name="content" value="{{ content }}">
</div>

<div class="form-group d-none" id="range_inputs">
    <label>Numeric Range</label>
    <div class="d-flex gap-2 col-md-6">
        <input type="number" class="form-control" id="range_min_input" name="range_min" placeholder="Min">
        <input type="number" class="form-control" id="range_max_input" name="range_max" placeholder="Max">
        <!-- Need a conversion btn here -->
         <button type="button" class="btn btn-secondary" id="range_convert_btn" >
            Convert
        </button>
    </div>
    <label>
        <small>The Conversion:</small>
    </label>
    <input type="text" class="form-control" id="range_display_input" name="content" value="{{content}}" placeholder="Regex will appear here...">
</div>

<div class="form-group">
    <select class="form-control custom-select col-md-6" name="case" id="case_option">
        <option value="">Case Sensitive</option>
        <option value="case_insensitive">Case Insensitive</option>
    </select>
</div>

<input type="hidden" name="data" id="data_field">
<input type="hidden" name="type" value="regex">

    // cleaner submit
document.querySelector("form").addEventListener("submit", function () {
        const mode = document.getElementById("regex_mode").value;
        const caseOpt = document.getElementById("case_option").value;
        
        // Define 'data' so the JSON.stringify doesn't fail
        let data = { mode: mode, case: caseOpt };

        if (mode === "range") {
            data.min = document.getElementById("range_min_input").value;
            data.max = document.getElementById("range_max_input").value;
        }
